[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./"}]

[profile.default.fuzz]
runs = 256

[profile.ci.fuzz]
runs = 5000

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "pledge-oracle/=lib/pledge-oracle/"
]

[fmt]
line_length = 120

[rpc_endpoints]
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC}"
robinhood_mainnet = "${ROBINHOOD_MAINNET_RPC}"

[etherscan]
robinhood_testnet = { key = "${ETHERSCAN_API_KEY}" }
robinhood_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://robinhoodchain.blockscout.com/api" }
